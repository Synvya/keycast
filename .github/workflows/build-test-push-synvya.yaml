# Synvya CI/CD: test, build, deploy to EC2, run QA suite.
#
# - synvya-staging: deploy to staging EC2, run QA
# - synvya: deploy to production EC2, run QA
#
# Required GitHub Variables (repo-level):
#   AWS_CI_ROLE_ARN, AWS_KMS_KEY_ID, AWS_REGION, AWS_SES_TEST_RECIPIENT
#
# Optional GitHub environment variables:
#   DISABLE_EMAILS - when set for an environment (for example `staging`),
#   injects DISABLE_EMAILS into the deployed keycast container env.
#
# Required GitHub Secrets:
#   EC2_STAGING_HOST, EC2_STAGING_SSH_KEY, EC2_PRODUCTION_HOST, EC2_PRODUCTION_SSH_KEY
#
# Optional GitHub Secrets:
#   GOOGLE_CHAT_WEBHOOK - when set, every job (test / deploy / qa) posts its
#   final status to the Google Chat webhook via voidrot/gchat-action. Unset
#   on forks / OSS clones; the notify step short-circuits via env-presence
#   check.

name: "Synvya - Build, Test & Push"

on:
  push:
    branches: [synvya-staging, synvya]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Lifted to workflow level so each job's notify step can check
  # `env.GOOGLE_CHAT_WEBHOOK != ''` in its `if:`. Secrets aren't
  # directly accessible in step-level `if:` expressions; routing through
  # `env:` is the standard workaround.
  GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}

permissions:
  id-token: write
  contents: read

jobs:
  # ── Step 1: Run tests (same as upstream + AWS provider tests) ───────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: keycast_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 16379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Setup test environment
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/keycast_test
          PGPASSWORD: postgres
        run: |
          chmod +x scripts/generate_key.sh
          ./scripts/generate_key.sh
          cargo install sqlx-cli@0.8.3 --no-default-features --features postgres
          sqlx migrate run --database-url $DATABASE_URL --source database/migrations

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/keycast_test
          REDIS_URL: redis://localhost:16379
          TEST_REDIS_URL: redis://localhost:16379
        run: |
          cargo test --workspace --verbose
          cargo test -p keycast_core --features integration-tests --lib --verbose
          cargo test -p keycast_api --features integration-tests --lib --tests --verbose
          cargo test -p keycast_signer --features integration-tests --lib --tests --verbose
          cargo test -p cluster-hashring --lib -- --ignored

      - name: Configure AWS credentials
        if: ${{ vars.AWS_CI_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Run AWS KMS tests
        if: ${{ vars.AWS_KMS_KEY_ID != '' }}
        env:
          AWS_KMS_KEY_ID: ${{ vars.AWS_KMS_KEY_ID }}
        run: |
          cargo test -p keycast_core --features aws -- aws_key_manager --test-threads=1

      - name: Run AWS SES tests
        if: ${{ vars.AWS_SES_TEST_RECIPIENT != '' }}
        env:
          AWS_SES_TEST_RECIPIENT: ${{ vars.AWS_SES_TEST_RECIPIENT }}
          FROM_EMAIL: ${{ vars.AWS_SES_FROM_EMAIL || 'noreply@synvya.com' }}
          FROM_NAME: ${{ vars.AWS_SES_FROM_NAME || 'Synvya' }}
          BASE_URL: https://example.com
        run: |
          cargo test -p keycast_api --features aws --test aws_ses_test -- --test-threads=1

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -A deprecated

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Step 2: Deploy to EC2 ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy (Staging)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/synvya-staging'
    environment: staging

    steps:
      - name: Deploy to staging EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_STAGING_SSH_KEY }}
          command_timeout: 60m
          script: |
            set -euo pipefail
            cd /opt/synvya/keycast
            if [ -n "$(git status --porcelain)" ]; then
              echo "Refusing to deploy from a dirty worktree"
              git status --short
              exit 1
            fi
            git pull --ff-only origin synvya-staging
            bash scripts/ec2-prepare-host.sh
            bash scripts/load-secrets.sh staging
            if [ -n "${{ vars.DISABLE_EMAILS }}" ]; then
              echo "DISABLE_EMAILS=${{ vars.DISABLE_EMAILS }}" >> /opt/synvya/.env
            fi
            docker system df || true
            # Light cleanup: drop dangling images and unreferenced build
            # cache only. `-a` would wipe referenced layers and force a
            # cold cargo build of all dependencies on every deploy.
            docker image prune -f || true
            docker builder prune -f || true
            # Force BuildKit so the Dockerfile's --mount=type=cache works.
            # Compose v2 enables it by default, but be explicit.
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker compose -f docker-compose.synvya.yml --env-file /opt/synvya/.env \
              build --build-arg CARGO_BUILD_JOBS=2 postgres redis migrate keycast
            docker compose -f docker-compose.synvya.yml --env-file /opt/synvya/.env \
              up -d postgres redis migrate keycast
            sleep 10
            curl -f http://localhost:3000/health || exit 1

  deploy-production:
    name: Deploy (Production)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/synvya'
    environment: production

    steps:
      - name: Deploy to production EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_PRODUCTION_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRODUCTION_SSH_KEY }}
          command_timeout: 60m
          script: |
            set -euo pipefail
            cd /opt/synvya/keycast
            if [ -n "$(git status --porcelain)" ]; then
              echo "Refusing to deploy from a dirty worktree"
              git status --short
              exit 1
            fi
            git pull --ff-only origin synvya
            bash scripts/ec2-prepare-host.sh
            bash scripts/load-secrets.sh production
            if [ -n "${{ vars.DISABLE_EMAILS }}" ]; then
              echo "DISABLE_EMAILS=${{ vars.DISABLE_EMAILS }}" >> /opt/synvya/.env
            fi
            docker system df || true
            # Light cleanup: drop dangling images and unreferenced build
            # cache only. `-a` would wipe referenced layers and force a
            # cold cargo build of all dependencies on every deploy.
            docker image prune -f || true
            docker builder prune -f || true
            # Force BuildKit so the Dockerfile's --mount=type=cache works.
            # Compose v2 enables it by default, but be explicit.
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker compose -f docker-compose.synvya.yml --env-file /opt/synvya/.env \
              build --build-arg CARGO_BUILD_JOBS=2 postgres redis migrate keycast
            docker compose -f docker-compose.synvya.yml --env-file /opt/synvya/.env \
              up -d postgres redis migrate keycast
            sleep 10
            curl -f http://localhost:3000/health || exit 1

  # ── Step 3: Run QA suite on deployed instance ──────────────────────────
  qa-staging:
    name: QA Suite (Staging)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Run QA tests on staging EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_STAGING_SSH_KEY }}
          command_timeout: 60m
          script: |
            set -e

            # Ensure build tools and Rust are installed
            if ! command -v cc &>/dev/null; then
              sudo yum install -y gcc openssl-devel pkg-config
            fi
            if ! command -v cargo &>/dev/null; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            fi
            source "$HOME/.cargo/env"

            # Ensure swap + cargo jobs limit are in place for the QA build
            bash /opt/synvya/keycast/scripts/ec2-prepare-host.sh

            # Load env for POSTGRES_PASSWORD
            set -a
            source /opt/synvya/.env 2>/dev/null || true
            set +a

            cd /opt/synvya/keycast

            export TEST_SERVER_URL=http://localhost:3000
            export DATABASE_URL="postgres://postgres:${POSTGRES_PASSWORD}@localhost:5432/keycast"
            export RUST_LOG=warn

            # Wait for keycast to be healthy
            echo "=== Waiting for keycast to be ready ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/health >/dev/null 2>&1; then
                echo "keycast is ready"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "keycast failed to start after 30 attempts"
                docker compose -f docker-compose.synvya.yml logs keycast --tail=50
                exit 1
              fi
              sleep 2
            done

            cd tests/qa

            FAILED=0

            echo "=== API OAuth Tests ==="
            cargo test --test api_oauth_test -- --test-threads=1 || FAILED=1

            echo "=== API RPC Tests ==="
            cargo test --test api_rpc_test -- --test-threads=1 || FAILED=1

            echo "=== NIP-46 Relay Tests ==="
            cargo test --test nip46_relay_test -- --test-threads=1 || FAILED=1

            echo "=== Security Tests ==="
            cargo test --test security_test -- --test-threads=1 || FAILED=1

            echo "=== User Journey Tests ==="
            cargo test --test user_journey_test -- --test-threads=1 || FAILED=1

            if [ $FAILED -ne 0 ]; then
              echo "=== SOME TESTS FAILED ==="
              exit 1
            fi

            echo "=== ALL TESTS PASSED ==="

  qa-production:
    name: QA Suite (Production)
    needs: deploy-production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Run QA tests on production EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_PRODUCTION_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_PRODUCTION_SSH_KEY }}
          command_timeout: 60m
          script: |
            set -e

            # Ensure build tools and Rust are installed
            if ! command -v cc &>/dev/null; then
              sudo yum install -y gcc openssl-devel pkg-config
            fi
            if ! command -v cargo &>/dev/null; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            fi
            source "$HOME/.cargo/env"

            # Ensure swap + cargo jobs limit are in place for the QA build
            bash /opt/synvya/keycast/scripts/ec2-prepare-host.sh

            # Load env for POSTGRES_PASSWORD
            set -a
            source /opt/synvya/.env 2>/dev/null || true
            set +a

            cd /opt/synvya/keycast

            export TEST_SERVER_URL=http://localhost:3000
            export DATABASE_URL="postgres://postgres:${POSTGRES_PASSWORD}@localhost:5432/keycast"
            export RUST_LOG=warn

            # Wait for keycast to be healthy
            echo "=== Waiting for keycast to be ready ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/health >/dev/null 2>&1; then
                echo "keycast is ready"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "keycast failed to start after 30 attempts"
                docker compose -f docker-compose.synvya.yml logs keycast --tail=50
                exit 1
              fi
              sleep 2
            done

            cd tests/qa

            FAILED=0

            echo "=== API OAuth Tests ==="
            cargo test --test api_oauth_test -- --test-threads=1 || FAILED=1

            echo "=== API RPC Tests ==="
            cargo test --test api_rpc_test -- --test-threads=1 || FAILED=1

            echo "=== NIP-46 Relay Tests ==="
            cargo test --test nip46_relay_test -- --test-threads=1 || FAILED=1

            echo "=== Security Tests ==="
            cargo test --test security_test -- --test-threads=1 || FAILED=1

            echo "=== User Journey Tests ==="
            cargo test --test user_journey_test -- --test-threads=1 || FAILED=1

            if [ $FAILED -ne 0 ]; then
              echo "=== SOME TESTS FAILED ==="
              exit 1
            fi

            echo "=== ALL TESTS PASSED ==="

  # ── Step 4: Consolidated workflow-status ping to Google Chat ───────────
  # One notification per run instead of one per job. Aggregates the prior
  # jobs' `needs.*.result` values into a single status, so a CI run posts
  # exactly once regardless of branch (staging push exercises 3 jobs,
  # production push exercises 3 different jobs, every feature-branch
  # push to a deploy branch exercises 1 job — all collapse to a single
  # ping). Gated on `env.GOOGLE_CHAT_WEBHOOK != ''` so forks / OSS clones
  # skip the step entirely.
  notify:
    name: Notify
    needs: [test, deploy-staging, deploy-production, qa-staging, qa-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate prior-job results
        id: aggregate
        run: |
          # `contains(needs.*.result, X)` is evaluated by the runner; we
          # rely on shell here so the precedence is obvious in logs. The
          # `skipped` value is fine — a job that doesn't apply to this
          # branch (e.g. deploy-production on a synvya-staging push) is
          # not a failure.
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "status=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi
      - name: Notify Google Chat
        if: ${{ env.GOOGLE_CHAT_WEBHOOK != '' }}
        uses: voidrot/gchat-action@v1
        with:
          webhook_url: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          message_type: 'workflow_status'
          status: ${{ steps.aggregate.outputs.status }}
