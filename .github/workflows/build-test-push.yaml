# Builds once, pushes to configured registries (GCP Artifact Registry and/or AWS ECR).
# Production push only on version tags (v*). Deploy triggers are cloud-specific.
#
# GCP Variables (repo-level):
#   Per environment: WORKLOAD_IDENTITY_PROVIDER_{ENV}, SERVICE_ACCOUNT_{ENV}, GCP_PROJECT_ID_{ENV}
# GCP Secrets:
#   CORECONFIG_DISPATCH_APP_ID, CORECONFIG_DISPATCH_APP_PRIVATE_KEY
#
# AWS Variables (repo-level):
#   AWS_DEPLOY_ROLE_ARN, AWS_REGION, AWS_ECR_REPOSITORY
#   AWS_ECS_CLUSTER, AWS_ECS_SERVICE, AWS_ECS_CONTAINER_NAME
#
# AWS CI Variables (for provider tests):
#   AWS_CI_ROLE_ARN, AWS_KMS_KEY_ID, AWS_SES_TEST_RECIPIENT
#
# GHCR Variables (optional):
#   GHCR_IMAGE (e.g., ghcr.io/org/keycast) — if unset, GHCR push is skipped

name: Build, Test & Push

on:
  push:
    branches: [main, fork-main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_production:
        description: 'Also push to production registry'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: keycast_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 16379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Setup test environment
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/keycast_test
          PGPASSWORD: postgres
        run: |
          # Generate master key
          chmod +x scripts/generate_key.sh
          ./scripts/generate_key.sh

          # Run migrations
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx migrate run --database-url $DATABASE_URL --source database/migrations

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/keycast_test
          REDIS_URL: redis://localhost:16379
          TEST_REDIS_URL: redis://localhost:16379
        run: |
          cargo test --workspace --verbose
          cargo test -p keycast_core --features integration-tests --lib --verbose
          cargo test -p keycast_api --features integration-tests --lib --tests --verbose
          cargo test -p keycast_signer --features integration-tests --lib --tests --verbose
          cargo test -p cluster-hashring --lib -- --ignored

      - name: Configure AWS credentials
        if: ${{ vars.AWS_CI_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Run AWS KMS tests
        if: ${{ vars.AWS_KMS_KEY_ID != '' }}
        env:
          AWS_KMS_KEY_ID: ${{ vars.AWS_KMS_KEY_ID }}
        run: |
          cargo test -p keycast_core --features aws -- aws_key_manager --test-threads=1

      - name: Run AWS SES tests
        if: ${{ vars.AWS_SES_TEST_RECIPIENT != '' }}
        env:
          AWS_SES_TEST_RECIPIENT: ${{ vars.AWS_SES_TEST_RECIPIENT }}
          FROM_EMAIL: ${{ vars.AWS_SES_FROM_EMAIL || 'noreply@divine.video' }}
          FROM_NAME: ${{ vars.AWS_SES_FROM_NAME || 'diVine' }}
          BASE_URL: https://example.com
        run: |
          cargo test -p keycast_api --features aws --test aws_ses_test -- --test-threads=1

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -A deprecated

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── GCP: Build, Push & Deploy ──────────────────────────────────────────
  docker-gcp:
    name: "Build & Push (GCP)"
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && vars.WORKLOAD_IDENTITY_PROVIDER_POC != ''
    permissions:
      id-token: write
      contents: read
    outputs:
      tags: ${{ steps.tags.outputs.tags }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        uses: divinevideo/divine-github-actions/generate-docker-tags@v1

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: keycast:local
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to POC
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: keycast:local
          registry-image: keycast
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_POC }}
          service-account: ${{ vars.SERVICE_ACCOUNT_POC }}
          project-id: ${{ vars.GCP_PROJECT_ID_POC }}
          repository: containers-poc
          region: us-central1

      - name: Push to Test
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: keycast:local
          registry-image: keycast
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_TEST }}
          service-account: ${{ vars.SERVICE_ACCOUNT_TEST }}
          project-id: ${{ vars.GCP_PROJECT_ID_TEST }}
          repository: containers-test
          region: us-central1

      - name: Push to Staging
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: keycast:local
          registry-image: keycast
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_STAGING }}
          service-account: ${{ vars.SERVICE_ACCOUNT_STAGING }}
          project-id: ${{ vars.GCP_PROJECT_ID_STAGING }}
          repository: containers-staging
          region: us-central1

      - name: Push to Production
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.include_production)
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: keycast:local
          registry-image: keycast
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_PRODUCTION }}
          service-account: ${{ vars.SERVICE_ACCOUNT_PRODUCTION }}
          project-id: ${{ vars.GCP_PROJECT_ID_PRODUCTION }}
          repository: containers-production
          region: us-central1

      - name: Summary
        run: |
          echo "### Docker Image Published (GCP)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** keycast" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.tags.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environments:**" >> $GITHUB_STEP_SUMMARY
          echo "- POC: \`us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_POC }}/containers-poc/keycast\`" >> $GITHUB_STEP_SUMMARY
          echo "- Test: \`us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_TEST }}/containers-test/keycast\`" >> $GITHUB_STEP_SUMMARY
          echo "- Staging: \`us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_STAGING }}/containers-staging/keycast\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ inputs.include_production }}" == "true" ]]; then
            echo "- Production: \`us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PRODUCTION }}/containers-production/keycast\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Log in to GHCR
        if: ${{ vars.GHCR_IMAGE != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: ${{ vars.GHCR_IMAGE != '' }}
        continue-on-error: true
        run: |
          docker tag keycast:local "${{ vars.GHCR_IMAGE }}:latest"
          docker tag keycast:local "${{ vars.GHCR_IMAGE }}:${{ github.sha }}"
          docker push "${{ vars.GHCR_IMAGE }}:latest"
          docker push "${{ vars.GHCR_IMAGE }}:${{ github.sha }}"

  deploy-gcp:
    name: "Deploy (GCP)"
    needs: docker-gcp
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && vars.WORKLOAD_IDENTITY_PROVIDER_POC != ''
    environment: staging

    steps:
      - name: Determine environments
        id: envs
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ inputs.include_production }}" == "true" ]]; then
            echo 'environments=["poc","test","staging","production"]' >> $GITHUB_OUTPUT
          else
            echo 'environments=["poc","test","staging"]' >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CORECONFIG_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CORECONFIG_DISPATCH_APP_PRIVATE_KEY }}
          owner: divinevideo
          repositories: divine-iac-coreconfig

      - name: Trigger image deploy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          cat <<EOF | gh api repos/divinevideo/divine-iac-coreconfig/dispatches --input -
          {
            "event_type": "image-deploy",
            "client_payload": {
              "application": "keycast",
              "environments": ${{ steps.envs.outputs.environments }},
              "images": [{"name": "keycast", "tag": "${SHORT_SHA}"}],
              "source_repo": "${{ github.repository }}",
              "source_sha": "${SHORT_SHA}",
              "source_ref": "${{ github.ref_name }}"
            }
          }
          EOF

          echo "## Deploy Dispatched (GCP)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Application | keycast |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environments | ${{ steps.envs.outputs.environments }} |" >> $GITHUB_STEP_SUMMARY

  # ── AWS: Build, Push & Deploy ──────────────────────────────────────────
  docker-aws:
    name: "Build & Push (AWS)"
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && vars.AWS_DEPLOY_ROLE_ARN != ''
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: keycast:local
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag and push to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag keycast:local "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag keycast:local "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Summary
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "### Docker Image Published (AWS ECR)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** $ECR_REGISTRY/${{ vars.AWS_ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  deploy-aws:
    name: "Deploy (AWS ECS)"
    needs: docker-aws
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && vars.AWS_ECS_CLUSTER != ''
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.AWS_ECS_SERVICE }} \
            --query taskDefinition > task-definition.json

      - name: Render new task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.AWS_ECS_CONTAINER_NAME }}
          image: ${{ needs.docker-aws.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.AWS_ECS_SERVICE }}
          cluster: ${{ vars.AWS_ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Summary
        run: |
          echo "## Deploy Complete (AWS ECS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | ${{ vars.AWS_ECS_CLUSTER }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ vars.AWS_ECS_SERVICE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ needs.docker-aws.outputs.image }} |" >> $GITHUB_STEP_SUMMARY
